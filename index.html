<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SEPA Scan for Revolut</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="icon-192.jpg" />

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    :root {
      --bg: #f3f6f8;
      --card: #ffffff;
      --card-2: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe3ea;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --ok: #166534;
      --ok-bg: #ecfdf5;
      --ok-border: #bbf7d0;
      --warn: #b45309;
      --warn-bg: #fffbeb;
      --warn-border: #fde68a;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef5f7 0%, #f8fbfc 100%);
      padding: 16px;
      line-height: 1.45;
    }

    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      z-index: 1000;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .skip-link:focus {
      left: 16px;
      top: 16px;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 72ch;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button,
    .file-label {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      cursor: pointer;
      background: #e8eef2;
      color: var(--text);
      transition: background 0.2s ease, opacity 0.2s ease, transform 0.1s ease;
      min-height: 44px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover,
    .file-label:hover {
      background: #dde7ec;
    }

    button:active,
    .file-label:active {
      transform: translateY(1px);
    }

    button.primary {
      background: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      background: var(--primary-hover);
    }

    button.danger {
      background: #fee2e2;
      color: var(--danger);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    input[type="file"] {
      display: none;
    }

    .media-wrap {
      margin-top: 12px;
    }

    video {
      width: 100%;
      max-width: 420px;
      border-radius: 14px;
      background: #0f172a;
      border: 1px solid var(--border);
      display: block;
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--card-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status.ok {
      background: var(--ok-bg);
      border-color: var(--ok-border);
      color: var(--ok);
    }

    .status.warn {
      background: var(--warn-bg);
      border-color: var(--warn-border);
      color: var(--warn);
    }

    .status.err {
      background: var(--danger-bg);
      border-color: var(--danger-border);
      color: var(--danger);
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .field {
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      min-height: 84px;
    }

    .field-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field-value {
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .mono {
      font-family: Consolas, Monaco, monospace;
    }

    #qrContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 240px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 12px;
      text-align: center;
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }
